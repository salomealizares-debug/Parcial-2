<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unidad Administrativa</title>
    <link rel="stylesheet" href="../css/style5.css">
</head>
<body>

<div class="container">

    <div class="top-bar">Unidad Administrativa</div>
    <header>UNIDAD ADMINISTRATIVA</header>

    <div class="formulario">

        <div class="fila">
            <label>ID:</label>
            <input type="text" id="inputId" placeholder="(automático)" disabled>
        </div>

        <div class="fila">
            <label>Nombre:</label>
            <input type="text" id="inputNombre" placeholder="Ej: Oficina Administrativa">
        </div>

        <div class="fila">
            <label>Descripción:</label>
            <textarea id="txtDescripcion" placeholder="Ej: Área principal"></textarea>
        </div>

        <div class="fila">
            <label>Estado:</label>
            <input type="text" id="inputEstado" placeholder="Ej: Activo">
        </div>

        <div class="botones">
            <button class="btn" id="btnGrabar">Grabar</button>
            <button class="btn" id="btnActualizar" style="display:none; background: linear-gradient(#b87d0f, #e6a817);">Actualizar</button>
            <button class="btn" id="btnCancelarEdicion" style="display:none; background: linear-gradient(#555, #888);">Cancelar</button>
            <button class="salir" id="btnSalir">Salir</button>
        </div>

    </div>

    <!-- Tabla de registros -->
    <div style="padding: 20px;">
        <h3 style="color: #2e5c8a; margin-bottom: 10px;">Registros</h3>
        <table id="tablaOficinas">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Nombre</th>
                    <th>Descripción</th>
                    <th>Estado</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody id="cuerpoTabla">
                <tr><td colspan="5" style="text-align:center;">Cargando...</td></tr>
            </tbody>
        </table>
    </div>

</div>

<!-- Popup éxito -->
<div id="popup" class="popup">
    <div class="ventana">
        <div class="barra">WSIAF <span class="cerrar" id="btnCerrarPopup">X</span></div>
        <p id="popupMensaje">Los datos fueron ingresados correctamente</p>
        <a href="#" class="aceptar" id="btnAceptarPopup">Aceptar</a>
    </div>
</div>

<!-- Popup confirmar eliminar -->
<div id="popupEliminar" class="popup">
    <div class="ventana">
        <div class="barra">WSIAF <span class="cerrar" id="btnCerrarEliminar">X</span></div>
        <p>¿Está seguro de que desea eliminar este registro?</p>
        <div style="display:flex; justify-content:center; gap:10px; margin-top:15px;">
            <button class="btn" id="btnConfirmarEliminar">Sí, eliminar</button>
            <a href="#" class="aceptar" id="btnCancelarEliminar">Cancelar</a>
        </div>
    </div>
</div>

<script src="../assets/unidad.js"></script>

</body>
</html>
